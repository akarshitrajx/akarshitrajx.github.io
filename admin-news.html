<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coding News - Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }

        /* Login Screen */
        .login-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            gap: 20px;
            padding: 20px;
        }
        .login-box {
            background: #1e293b;
            padding: 40px;
            border-radius: 16px;
            border: 1px solid #334155;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-box h1 {
            color: #fbbf24;
            font-size: 28px;
            margin-bottom: 8px;
            font-weight: 800;
        }
        .login-box p { color: #94a3b8; margin-bottom: 24px; font-size: 15px; }
        .login-box input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #334155;
            border-radius: 10px;
            background: #0f172a;
            color: #e2e8f0;
            font-size: 16px;
            margin-bottom: 16px;
            font-family: 'Inter', sans-serif;
        }
        .login-box input:focus {
            outline: none;
            border-color: #fbbf24;
        }
        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
        }
        .btn-primary {
            background: #fbbf24;
            color: #0f172a;
            width: 100%;
        }
        .btn-primary:hover { background: #f59e0b; transform: translateY(-2px); }
        .btn-danger {
            background: #ef4444;
            color: white;
            padding: 8px 16px;
            font-size: 14px;
        }
        .btn-danger:hover { background: #dc2626; }
        .btn-secondary {
            background: #334155;
            color: #e2e8f0;
            padding: 10px 20px;
            font-size: 14px;
        }
        .btn-secondary:hover { background: #475569; }

        /* Admin Dashboard */
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #334155;
            flex-wrap: wrap;
            gap: 16px;
        }
        .admin-header h1 { color: #fbbf24; font-size: 28px; font-weight: 800; }
        .logout-btn {
            background: transparent;
            border: 1px solid #ef4444;
            color: #ef4444;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
        }
        .logout-btn:hover { background: #ef4444; color: white; }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }

        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 28px;
        }
        .card h2 {
            color: #fbbf24;
            font-size: 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
        }

        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #cbd5e1;
            font-weight: 500;
            font-size: 14px;
        }
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #334155;
            border-radius: 10px;
            background: #0f172a;
            color: #e2e8f0;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
        }
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #fbbf24;
        }
        .form-group textarea {
            min-height: 150px;
            resize: vertical;
        }

        .news-list { max-height: 500px; overflow-y: auto; }
        .news-item {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
        }
        .news-item-info { flex: 1; }
        .news-item-info h3 {
            color: #e2e8f0;
            font-size: 16px;
            margin-bottom: 4px;
            font-weight: 600;
        }
        .news-item-info span {
            color: #64748b;
            font-size: 13px;
        }
        .news-item-info .category {
            display: inline-block;
            background: #fbbf24;
            color: #0f172a;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 6px;
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 16px 24px;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            transform: translateX(400px);
            transition: transform 0.3s;
            z-index: 1000;
        }
        .toast.show { transform: translateX(0); }
        .toast.success { background: #22c55e; }
        .toast.error { background: #ef4444; }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #64748b;
        }
        .empty-state p { font-size: 16px; }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #94a3b8;
            text-decoration: none;
            margin-bottom: 20px;
            font-weight: 500;
            font-size: 15px;
        }
        .back-link:hover { color: #fbbf24; }

        .loading-spinner {
            width: 30px;
            height: 30px;
            border: 3px solid #334155;
            border-top-color: #fbbf24;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div id="loginScreen" class="login-screen">
        <div class="login-box">
            <h1>🔐 Admin Panel</h1>
            <p>Coding News Management</p>
            <input type="password" id="adminPassword" placeholder="Enter admin password..." autocomplete="off">
            <button class="btn btn-primary" onclick="login()">Login</button>
        </div>
        <a href="index.html" class="back-link">← Back to Coding Master</a>
    </div>

    <!-- Admin Dashboard -->
    <div id="adminDashboard" class="container" style="display:none;">
        <div class="admin-header">
            <h1>📝 Coding News Admin</h1>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>

        <div class="grid">
            <!-- Add News Form -->
            <div class="card">
                <h2>✨ Add New Article</h2>
                <div class="form-group">
                    <label>Title *</label>
                    <input type="text" id="newsTitle" placeholder="e.g., New JavaScript Features 2026">
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select id="newsCategory">
                        <option value="General">General</option>
                        <option value="JavaScript">JavaScript</option>
                        <option value="Python">Python</option>
                        <option value="Web Development">Web Development</option>
                        <option value="AI/ML">AI/ML</option>
                        <option value="Career">Career</option>
                        <option value="Tools">Tools</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Image URL (optional)</label>
                    <input type="text" id="newsImage" placeholder="https://example.com/image.jpg">
                </div>
                <div class="form-group">
                    <label>Content *</label>
                    <textarea id="newsContent" placeholder="Write your news article here..."></textarea>
                </div>
                <button class="btn btn-primary" onclick="postNews()">🚀 Publish News</button>
            </div>

            <!-- News List -->
            <div class="card">
                <h2>📰 All Articles</h2>
                <div id="newsList" class="news-list">
                    <div class="empty-state">
                        <div class="loading-spinner"></div>
                        <p>Loading articles...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        // ========== SUPABASE CONFIG ==========
        const SUPABASE_URL = 'https://azodsizcpawgwhowqdir.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF6b2RzaXpjcGF3Z3dob3dxZGlyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MjA5NDUsImV4cCI6MjA5NzA5Njk0NX0.i77gxmMddm-dr4tQCfSGBnQkCPE1sx3muDdKeYqmWVQ';

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let adminToken = localStorage.getItem('adminToken');

        // ========== LOGIN ==========
        function login() {
            const password = document.getElementById('adminPassword').value;
            if (!password) {
                showToast('Please enter password', 'error');
                return;
            }
            adminToken = password;
            localStorage.setItem('adminToken', password);
            showDashboard();
        }

        function logout() {
            adminToken = null;
            localStorage.removeItem('adminToken');
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('adminDashboard').style.display = 'none';
        }

        function showDashboard() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('adminDashboard').style.display = 'block';
            loadNews();
        }

        // ========== POST NEWS ==========
        async function postNews() {
            const title = document.getElementById('newsTitle').value.trim();
            const content = document.getElementById('newsContent').value.trim();
            const image_url = document.getElementById('newsImage').value.trim();
            const category = document.getElementById('newsCategory').value;

            if (!title || !content) {
                showToast('Title and Content are required!', 'error');
                return;
            }

            // Simple password check
            if (adminToken !== 'admin123') {
                showToast('Invalid admin password for posting!', 'error');
                return;
            }

            try {
                const { data, error } = await supabase
                    .from('news')
                    .insert([
                        { title, content, image_url, category }
                    ])
                    .select();

                if (error) throw error;

                showToast('News published successfully! 🎉', 'success');
                document.getElementById('newsTitle').value = '';
                document.getElementById('newsContent').value = '';
                document.getElementById('newsImage').value = '';
                loadNews();
            } catch (err) {
                console.error('Error posting news:', err);
                showToast('Error: ' + err.message, 'error');
            }
        }

        // ========== LOAD NEWS ==========
        async function loadNews() {
            try {
                const { data: news, error } = await supabase
                    .from('news')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                renderNewsList(news || []);
            } catch (err) {
                console.error('Error loading news:', err);
                document.getElementById('newsList').innerHTML = 
                    '<div class="empty-state"><p>Error loading news</p></div>';
            }
        }

        function renderNewsList(news) {
            const container = document.getElementById('newsList');

            if (!news || news.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <p>No articles yet. Create your first news post!</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = news.map(item => `
                <div class="news-item">
                    <div class="news-item-info">
                        <h3>${escapeHtml(item.title)}</h3>
                        <span>${formatDate(item.created_at)}</span>
                        <div class="category">${item.category || 'General'}</div>
                    </div>
                    <button class="btn btn-danger" onclick="deleteNews(${item.id})">Delete</button>
                </div>
            `).join('');
        }

        // ========== DELETE NEWS ==========
        async function deleteNews(id) {
            if (!confirm('Are you sure you want to delete this article?')) return;

            if (adminToken !== 'admin123') {
                showToast('Invalid admin password for deleting!', 'error');
                return;
            }

            try {
                const { error } = await supabase
                    .from('news')
                    .delete()
                    .eq('id', id);

                if (error) throw error;

                showToast('Article deleted!', 'success');
                loadNews();
            } catch (err) {
                console.error('Error deleting news:', err);
                showToast('Error: ' + err.message, 'error');
            }
        }

        // ========== UTILS ==========
        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDate(dateString) {
            if (!dateString) return 'Unknown date';
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', { 
                year: 'numeric', month: 'short', day: 'numeric',
                hour: '2-digit', minute: '2-digit'
            });
        }

        // ========== INIT ==========
        if (adminToken) {
            showDashboard();
        }
    </script>
</body>
</html>
