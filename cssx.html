<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>CSS Tutorial - All in one guide</title>
    <style>
        /* ============================
                   RESET & BASE
                ============================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            background: #0a0a1a;
            background-image:
                radial-gradient(ellipse at 10% 20%, rgba(233, 69, 96, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 90% 80%, rgba(245, 166, 35, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(15, 52, 96, 0.2) 0%, transparent 70%);
            color: #e4e4f0;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* ============================
                   HEADER
                ============================ */
        .main-header {
            text-align: center;
            padding: 45px 30px 35px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            margin-bottom: 40px;
            position: relative;
            overflow: hidden;
        }

        .main-header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 40%, rgba(233, 69, 96, 0.04), transparent 60%);
            animation: rotateGlow 30s linear infinite;
        }

        @keyframes rotateGlow {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .main-header h1 {
            font-size: 3.2rem;
            font-weight: 900;
            background: linear-gradient(135deg, #e94560, #f5a623, #e94560);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradShift 4s ease infinite;
            position: relative;
            z-index: 1;
            letter-spacing: 1px;
        }

        @keyframes gradShift {
            0%,
            100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }

        .main-header .sub {
            color: #8899bb;
            font-size: 1.05rem;
            letter-spacing: 2px;
            margin-top: 6px;
            position: relative;
            z-index: 1;
        }

        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 20px 35px;
            flex-wrap: wrap;
            margin-top: 18px;
            position: relative;
            z-index: 1;
        }

        .stats-bar .pill {
            background: rgba(255, 255, 255, 0.04);
            padding: 6px 24px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            font-size: 0.95rem;
            backdrop-filter: blur(10px);
        }

        .stats-bar .pill strong {
            color: #e94560;
            font-size: 1.1rem;
        }

        .progress-wrap {
            width: 100%;
            max-width: 500px;
            margin: 16px auto 0;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 40px;
            height: 8px;
            overflow: hidden;
            position: relative;
            z-index: 1;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .progress-wrap .bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #e94560, #f5a623);
            border-radius: 40px;
            transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .share-btn-header {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #fff;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.3s;
            position: relative;
            z-index: 1;
        }

        .share-btn-header:hover {
            background: rgba(233, 69, 96, 0.15);
            border-color: #e94560;
        }

        /* ============================
                   TOPIC CARD
                ============================ */
        .topic-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 30px 30px 28px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 30px;
            transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1);
            opacity: 0.25;
            pointer-events: none;
            filter: blur(2px) grayscale(0.5);
            transform: scale(0.97);
        }

        .topic-card.active {
            opacity: 1;
            pointer-events: auto;
            filter: blur(0) grayscale(0);
            transform: scale(1);
            border-color: rgba(233, 69, 96, 0.15);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.03);
        }

        .topic-card.completed {
            opacity: 0.7;
            pointer-events: none;
            filter: grayscale(0.3);
            border-color: rgba(46, 204, 113, 0.2);
        }

        .topic-card .topic-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px 16px;
            margin-bottom: 4px;
        }

        .topic-card .topic-head h2 {
            font-size: 1.7rem;
            color: #f5a623;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .topic-card .topic-head .badge {
            background: rgba(233, 69, 96, 0.2);
            color: #e94560;
            font-size: 0.7rem;
            padding: 2px 16px;
            border-radius: 40px;
            font-weight: 700;
            border: 1px solid rgba(233, 69, 96, 0.1);
        }

        .topic-card .topic-head .status-badge {
            font-size: 0.8rem;
            background: rgba(255, 255, 255, 0.04);
            padding: 4px 18px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            color: #8899bb;
        }

        .topic-card .topic-head .status-badge.active-status {
            color: #f5a623;
            border-color: rgba(245, 166, 35, 0.15);
        }

        .topic-card .topic-head .status-badge.done-status {
            color: #2ecc71;
            border-color: rgba(46, 204, 113, 0.15);
        }

        /* ----- Explanation Box ----- */
        .explanation-box {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 16px;
            padding: 20px 24px;
            margin: 14px 0 20px;
            border-left: 3px solid #e94560;
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-left-width: 4px;
        }

        .explanation-box .exp-title {
            color: #f5a623;
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .explanation-box .exp-content {
            color: #c8d0e8;
            line-height: 1.8;
            font-size: 0.95rem;
        }

        .explanation-box .exp-content code {
            background: rgba(233, 69, 96, 0.1);
            padding: 2px 10px;
            border-radius: 6px;
            font-size: 0.9rem;
            color: #f5a623;
            font-family: 'Consolas', monospace;
        }

        .explanation-box .exp-content .highlight {
            color: #e94560;
            font-weight: 600;
        }

        .explanation-box .exp-content ul {
            list-style: none;
            padding: 0;
            margin: 8px 0;
        }

        .explanation-box .exp-content ul li {
            padding: 4px 0 4px 24px;
            position: relative;
        }

        .explanation-box .exp-content ul li::before {
            content: '▸';
            color: #e94560;
            position: absolute;
            left: 0;
        }

        /* ----- Sub-topics ----- */
        .sub-topics {
            display: flex;
            flex-wrap: wrap;
            gap: 6px 10px;
            margin-bottom: 16px;
        }

        .sub-topics span {
            background: rgba(255, 255, 255, 0.03);
            padding: 3px 14px;
            border-radius: 30px;
            font-size: 0.75rem;
            color: #99aacd;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        /* ----- Questions ----- */
        .q-section {
            display: grid;
            gap: 14px;
            margin-top: 16px;
        }

        .q-block {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 14px;
            padding: 16px 20px;
            border-left: 3px solid rgba(255, 255, 255, 0.05);
            transition: 0.3s;
        }

        .q-block.correct {
            border-left-color: #2ecc71;
            background: rgba(46, 204, 113, 0.04);
        }

        .q-block.wrong {
            border-left-color: #e74c3c;
            background: rgba(231, 76, 60, 0.04);
        }

        .q-block .q-text {
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 8px;
            display: flex;
            align-items: baseline;
            gap: 10px;
            flex-wrap: wrap;
        }

        .q-block .q-text .q-type {
            font-size: 0.6rem;
            background: rgba(255, 255, 255, 0.04);
            padding: 1px 12px;
            border-radius: 30px;
            font-weight: 500;
            color: #8899bb;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .q-block .options {
            display: flex;
            flex-wrap: wrap;
            gap: 6px 18px;
            margin-top: 4px;
        }

        .q-block .options label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
            cursor: pointer;
            padding: 3px 10px;
            border-radius: 30px;
            transition: 0.15s;
        }

        .q-block .options label:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .q-block input[type="radio"],
        .q-block input[type="checkbox"] {
            accent-color: #e94560;
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .q-block .fill-input {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: #fff;
            padding: 8px 16px;
            border-radius: 10px;
            width: 100%;
            max-width: 300px;
            font-size: 0.95rem;
            transition: 0.2s;
        }

        .q-block .fill-input:focus {
            border-color: rgba(233, 69, 96, 0.3);
            outline: none;
            box-shadow: 0 0 0 3px rgba(233, 69, 96, 0.05);
        }

        .q-block .fill-input.correct {
            border-color: #2ecc71;
            background: rgba(46, 204, 113, 0.04);
        }

        .q-block .fill-input.wrong {
            border-color: #e74c3c;
            background: rgba(231, 76, 60, 0.04);
        }

        .q-block .feedback {
            margin-top: 8px;
            font-size: 0.9rem;
            display: none;
            gap: 8px;
            align-items: center;
        }

        .q-block .feedback.show {
            display: flex;
        }

        .q-block .feedback .icon {
            font-size: 1.1rem;
        }

        .q-block .feedback .msg {
            color: #99aacd;
        }

        .q-block .feedback .msg strong {
            color: #fff;
        }

        /* ----- Buttons ----- */
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px 20px;
            margin-top: 22px;
            padding-top: 18px;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
        }

        .btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: #fff;
            padding: 10px 28px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(10px);
        }

        .btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .btn-primary {
            background: linear-gradient(135deg, rgba(233, 69, 96, 0.2), rgba(192, 57, 43, 0.2));
            border-color: rgba(233, 69, 96, 0.15);
            color: #e94560;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, rgba(233, 69, 96, 0.3), rgba(192, 57, 43, 0.3));
            border-color: rgba(233, 69, 96, 0.25);
        }

        .btn-success {
            background: linear-gradient(135deg, rgba(46, 204, 113, 0.15), rgba(39, 174, 96, 0.15));
            border-color: rgba(46, 204, 113, 0.15);
            color: #2ecc71;
        }

        .btn-success:hover {
            background: linear-gradient(135deg, rgba(46, 204, 113, 0.25), rgba(39, 174, 96, 0.25));
            border-color: rgba(46, 204, 113, 0.25);
        }

        .btn-share {
            background: rgba(52, 152, 219, 0.1);
            border-color: rgba(52, 152, 219, 0.1);
            color: #5dade2;
        }

        .btn-share:hover {
            background: rgba(52, 152, 219, 0.2);
            border-color: rgba(52, 152, 219, 0.2);
        }

        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none !important;
            filter: none !important;
        }

        .btn .count-badge {
            background: rgba(255, 255, 255, 0.05);
            padding: 0 12px;
            border-radius: 30px;
            font-size: 0.75rem;
        }

        .score-display {
            font-size: 0.9rem;
            color: #8899bb;
            margin-left: auto;
        }

        .score-display strong {
            color: #f5a623;
        }

        /* ============================
                   RESPONSIVE
                ============================ */
        @media (max-width: 700px) {
            .main-header h1 {
                font-size: 2rem;
            }
            .topic-card .topic-head h2 {
                font-size: 1.3rem;
            }
            .topic-card {
                padding: 20px 18px;
            }
            .q-block {
                padding: 14px 16px;
            }
            .q-block .options {
                gap: 4px 10px;
            }
            .btn-group {
                flex-direction: column;
                align-items: stretch;
            }
            .btn {
                justify-content: center;
            }
            .score-display {
                margin-left: 0;
                text-align: center;
            }
            .explanation-box {
                padding: 16px 18px;
            }
        }

        /* ============================
                   TOAST
                ============================ */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            padding: 14px 28px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 0.95rem;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1);
            z-index: 999;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(233, 69, 96, 0.3);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(233, 69, 96, 0.5);
        }
    </style>
</head>
<body>

    <div class="container" id="app">

        <!-- ===== HEADER ===== -->
        <header class="main-header">
            <h1>🎨 CSS Tutorial — All in one guide</h1>
            <p class="sub">50 Topics · 20 Questions Each · Learn &amp; Master CSS</p>
            <div class="stats-bar">
                <span class="pill">📘 <strong id="totalTopics">50</strong> Topics</span>
                <span class="pill">📝 <strong id="totalQuestions">1000</strong> Questions</span>
                <span class="pill">✅ <strong id="completedTopics">0</strong> / 50 Done</span>
                <button class="share-btn-header" onclick="shareProgress()">📤 Share Progress</button>
            </div>
            <div class="progress-wrap">
                <div class="bar" id="progressBar" style="width:0%;"></div>
            </div>
        </header>

        <!-- ===== TOPICS RENDER ===== -->
        <div id="topicContainer"></div>

        <!-- ===== TOAST ===== -->
        <div class="toast" id="toast"></div>
    </div>

    <script>
        // ============================================================
        //  DATA — 50 TOPICS with DEEP EXPLANATIONS (Pure English)
        // ============================================================

        const TOPICS = [{
            id: 1,
            name: 'CSS Fundamentals',
            subs: ['Intro', 'Syntax', 'Ways to Add CSS', 'Selectors', 'Universal', 'Type', 'Class', 'ID', 'Grouping',
                'Best Practices'
            ],
            explanation: `
                        <p><strong>CSS (Cascading Style Sheets)</strong> is a styling language used to make HTML elements beautiful and attractive. Without CSS, websites look like plain text documents.</p>
                        <p><strong>CSS Syntax:</strong> <code>selector { property: value; }</code></p>
                        <p><strong>Three Ways to Add CSS:</strong></p>
                        <ul>
                            <li><strong>Inline CSS:</strong> Directly inside HTML tag — <code>&lt;h1 style="color: blue;"&gt;Hello&lt;/h1&gt;</code> — ✅ Fast, ❌ Not reusable</li>
                            <li><strong>Internal CSS:</strong> Inside <code>&lt;style&gt;</code> tag in <code>&lt;head&gt;</code> — ✅ Best for single page, ❌ Doesn't work across multiple pages</li>
                            <li><strong>External CSS:</strong> Separate <code>.css</code> file linked — <code>&lt;link rel="stylesheet" href="style.css"&gt;</code> — ✅ Best practice, reusable, maintainable</li>
                        </ul>
                        <p><strong>Types of Selectors:</strong></p>
                        <ul>
                            <li><strong>Universal Selector (*):</strong> Selects ALL elements — <code>* { margin: 0; }</code></li>
                            <li><strong>Type Selector (element):</strong> Selects specific tag — <code>p { color: red; }</code></li>
                            <li><strong>Class Selector (.class):</strong> Selects elements with class — <code>.box { border: 1px solid; }</code></li>
                            <li><strong>ID Selector (#id):</strong> Selects element with unique ID — <code>#header { background: black; }</code></li>
                            <li><strong>Grouping Selector (,):</strong> Multiple selectors together — <code>h1, h2, h3 { color: blue; }</code></li>
                        </ul>
                        <p><strong>Specificity Hierarchy:</strong> Inline Style > ID > Class > Type > Universal</p>
                        <p><strong>Cascading Rule:</strong> If two styles target same element, the later style wins (last one wins) and the more specific style wins.</p>
                        <p>💡 <strong>Best Practices:</strong> Use external CSS, prefer classes over IDs, keep selectors simple, avoid <code>!important</code>, and always test on multiple browsers.</p>
                    `
        }, {
            id: 2,
            name: 'CSS Combinators',
            subs: ['Descendant', 'Child', 'Adjacent Sibling', 'General Sibling', 'Attribute Selectors', 'Value', 'Contains', 'Starts With', 'Ends With', 'Substring'],
            explanation: `
                        <p><strong>CSS Combinators</strong> define the relationship between selectors. They help you target elements based on their position in the HTML structure.</p>
                        <p><strong>Types of Combinators:</strong></p>
                        <ul>
                            <li><strong>Descendant Selector (space):</strong> Selects all elements inside a parent — <code>div p { color: red; }</code> — all <code>&lt;p&gt;</code> inside any <code>&lt;div&gt;</code></li>
                            <li><strong>Child Selector (&gt;):</strong> Selects direct children only — <code>div &gt; p { color: blue; }</code> — only direct <code>&lt;p&gt;</code> children of <code>&lt;div&gt;</code></li>
                            <li><strong>Adjacent Sibling Selector (+):</strong> Selects the immediate next sibling — <code>h1 + p { margin-top: 0; }</code> — <code>&lt;p&gt;</code> immediately after <code>&lt;h1&gt;</code></li>
                            <li><strong>General Sibling Selector (~):</strong> Selects all next siblings — <code>h1 ~ p { color: gray; }</code> — all <code>&lt;p&gt;</code> after <code>&lt;h1&gt;</code></li>
                        </ul>
                        <p><strong>Attribute Selectors:</strong></p>
                        <ul>
                            <li><strong>Exact Match:</strong> <code>[type="text"]</code> — selects elements with exact attribute value</li>
                            <li><strong>Contains Word:</strong> <code>[class~="box"]</code> — selects elements where class contains "box"</li>
                            <li><strong>Starts With:</strong> <code>[href^="https"]</code> — selects links starting with "https"</li>
                            <li><strong>Ends With:</strong> <code>[src$=".jpg"]</code> — selects images ending with ".jpg"</li>
                            <li><strong>Contains Substring:</strong> <code>[title*="hello"]</code> — selects elements with "hello" in title</li>
                        </ul>
                        <p>💡 <strong>Tip:</strong> Use combinators to write clean, specific CSS without adding extra classes. Child selectors are more performant than descendant selectors.</p>
                    `
        }, {
            id: 3,
            name: 'Colors Complete',
            subs: ['Named Colors', 'Hex Codes', 'RGB', 'RGBA', 'HSL', 'HSLA', 'currentColor', 'transparent', 'color-mix()', 'color-contrast()'],
            explanation: `
                        <p><strong>Colors</strong> in CSS can be defined in multiple ways. Each method has its own use case and benefits.</p>
                        <p><strong>Color Formats:</strong></p>
                        <ul>
                            <li><strong>Named Colors:</strong> Pre-defined color names — <code>red, blue, tomato, skyblue, coral</code> — Easy to use but limited options</li>
                            <li><strong>Hex Codes:</strong> <code>#FF0000</code> (red), <code>#00FF00</code> (green), <code>#0000FF</code> (blue) — Most common in design</li>
                            <li><strong>Hex Shorthand:</strong> <code>#F00</code> (red), <code>#0F0</code> (green) — when each pair is same</li>
                            <li><strong>RGB:</strong> <code>rgb(255, 0, 0)</code> — values 0-255, good for dynamic colors</li>
                            <li><strong>RGBA:</strong> <code>rgba(255, 0, 0, 0.5)</code> — RGB with alpha/opacity (0 = transparent, 1 = solid)</li>
                            <li><strong>HSL:</strong> <code>hsl(0, 100%, 50%)</code> — Hue (0-360), Saturation (0-100%), Lightness (0-100%) — <span class="highlight">Easier to manipulate</span></li>
                            <li><strong>HSLA:</strong> <code>hsla(0, 100%, 50%, 0.5)</code> — HSL with alpha/opacity</li>
                            <li><strong>currentColor:</strong> Uses the current text color — <code>border-color: currentColor;</code></li>
                            <li><strong>transparent:</strong> Fully transparent — <code>background: transparent;</code></li>
                            <li><strong>color-mix():</strong> Mix two colors — <code>color-mix(in srgb, red, blue 50%)</code> — modern CSS feature</li>
                            <li><strong>color-contrast():</strong> Automatically choose contrasting color — <code>color-contrast(black vs white, yellow)</code></li>
                        </ul>
                        <p>💡 <strong>Pro Tip:</strong> Use <span class="highlight">HSL</span> for easier color manipulation. To darken a color, decrease lightness; to saturate, increase saturation.</p>

        // ============================================================
        //  QUESTION BUILDER
        // ============================================================

        function buildQuestionsForTopic(topicId) {
            const qs = [];

            // 10 MCQ
            for (let i = 0; i < 10; i++) {
                const correct = Math.floor(Math.random() * 4);
                const mcqQuestions = [
                    { q: 'What is CSS used for?', opts: ['Styling HTML', 'Creating HTML', 'Making databases', 'Server logic'],
                        ans: 0 },
                    { q: 'Which CSS property changes text color?', opts: ['color', 'background', 'font-style',
                            'text-decoration'
                        ], ans: 0 },
                    { q: 'What does "display: flex" do?', opts: ['Enables Flexbox', 'Hides element',
                            'Makes element inline', 'Makes element block'
                        ], ans: 0 },
                    { q: 'Which unit is recommended for accessibility?', opts: ['px', 'rem', 'em', 'pt'], ans: 1 },
                    { q: 'What is the specificity order?', opts: ['ID > Class > Type', 'Type > Class > ID',
                            'Class > ID > Type', 'ID > Type > Class'
                        ], ans: 0 },
                    { q: 'Which property creates rounded corners?', opts: ['border-radius', 'border-style',
                            'border-color', 'border-width'
                        ], ans: 0 },
                    { q: 'What does "position: sticky" do?', opts: ['Scrolls then sticks', 'Always fixed',
                            'Always relative', 'Always absolute'
                        ], ans: 0 },
                    { q: 'Which property makes an element transparent?', opts: ['opacity', 'visibility', 'display',
                            'position'
                        ], ans: 0 },
                    { q: 'What is the best practice for adding CSS?', opts: ['External', 'Inline', 'Internal',
                            'All are equal'
                        ], ans: 0 },
                    { q: 'Which pseudo-element creates content before?', opts: ['::before', '::after', ':before',
                            ':after'
                        ], ans: 0 }
                ];
                const idx = i % mcqQuestions.length;
                const q = mcqQuestions[idx];
                qs.push({
                    type: 'mcq',
                    question: q.q,
                    options: q.opts,
                    correct: q.ans
                });
            }

            // 5 True/False
            const tfData = [
                { q: 'CSS stands for Cascading Style Sheets.', ans: true },
                { q: 'The "margin" property adds space inside the border.', ans: false },
                { q: '"display: flex" is used for Flexbox layout.', ans: true },
                { q: '"position: fixed" keeps an element relative to the viewport.', ans: true },
                { q: '"z-index" only works on static positioned elements.', ans: false },
                { q: 'CSS variables start with two hyphens (--).', ans: true },
                { q: 'The "padding" property adds space outside the border.', ans: false },
                { q: '"grid-template-columns" defines columns in Grid.', ans: true },
                { q: '"::before" is a pseudo-class, not a pseudo-element.', ans: false },
                { q: '"box-sizing: border-box" includes padding and border in width.', ans: true }
            ];
            for (let i = 0; i < 5; i++) {
                const d = tfData[i % tfData.length];
                qs.push({ type: 'tf', question: d.q, correct: d.ans });
            }

            // 5 Fill in the blank
            const fillData = [
                { q: 'The _____ property adds space inside the element.', ans: 'padding' },
                { q: 'The _____ property adds space outside the element.', ans: 'margin' },
                { q: '_____ is used to create 2D layouts with rows and columns.', ans: 'grid' },
                { q: '_____ is used to create 1D flexible layouts.', ans: 'flexbox' },
                { q: 'The _____ property sets the font size of an element.', ans: 'font-size' },
                { q: 'The _____ property sets the background color.', ans: 'background-color' },
                { q: '_____ creates rounded corners on elements.', ans: 'border-radius' },
                { q: 'The _____ property controls the stacking order.', ans: 'z-index' },
                { q: '_____ is the best practice for adding CSS.', ans: 'external' },
                { q: 'The _____ selector selects all elements.', ans: '*' }
            ];
            for (let i = 0; i < 5; i++) {
                const d = fillData[i % fillData.length];
                qs.push({ type: 'fill', question: d.q, correct: d.ans.toLowerCase() });
            }

            // Shuffle
            for (let i = qs.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [qs[i], qs[j]] = [qs[j], qs[i]];
            }
            return qs;
        }

        // ============================================================
        //  APP STATE (localStorage)
        // ============================================================

        function getDefaultState() {
            return {
                currentTopic: 0,
                completedTopics: [],
                topicStatus: {}
            };
        }

        let state;

        function loadState() {
            const saved = localStorage.getItem('cssx_state');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    state = parsed;
                    TOPICS.forEach(t => {
                        if (!state.topicStatus[t.id]) {
                            state.topicStatus[t.id] = { answers: [], score: 0, checked: false };
                        }
                    });
                    return;
                } catch (e) {}
            }
            state = getDefaultState();
            TOPICS.forEach(t => {
                state.topicStatus[t.id] = { answers: [], score: 0, checked: false };
            });
            saveState();
        }

        function saveState() {
            localStorage.setItem('cssx_state', JSON.stringify(state));
        }

        // ============================================================
        //  RENDER
        // ============================================================

        const container = document.getElementById('topicContainer');
        const progressBar = document.getElementById('progressBar');
        const completedSpan = document.getElementById('completedTopics');

        function render() {
            container.innerHTML = '';
            let completedCount = state.completedTopics.length;

            TOPICS.forEach((topic, idx) => {
                const isCompleted = state.completedTopics.includes(topic.id);
                const isActive = (idx === state.currentTopic && !isCompleted);
                const isLocked = (idx > state.currentTopic) && !isCompleted;

                const card = document.createElement('div');
                card.className = 'topic-card';
                if (isActive) card.classList.add('active');
                if (isCompleted) card.classList.add('completed');

                let statusLabel = '🔒 Locked';
                let statusClass = '';
                if (isCompleted) { statusLabel = '✅ Completed';
                    statusClass = 'done-status'; } else if (isActive) { statusLabel = '📖 Active';
                    statusClass = 'active-status'; }

                // Build explanation HTML
                let expHTML = topic.explanation || '<p>Explanation not available.</p>';

                card.innerHTML = `
                        <div class="topic-head">
                            <h2>
                                <span>${topic.id}.</span>
                                ${topic.name}
                                <span class="badge">20 Q</span>
                            </h2>
                            <span class="status-badge ${statusClass}">${statusLabel}</span>
                        </div>
                        <div class="sub-topics">
                            ${topic.subs.map(s => `<span>${s}</span>`).join(' ')}
                        </div>
                        <div class="explanation-box">
                            <div class="exp-title">📖 What you'll learn:</div>
                            <div class="exp-content">${expHTML}</div>
                        </div>
                        <div class="q-section" id="qSection-${topic.id}"></div>
                        <div class="btn-group">
                            <button class="btn btn-primary" id="checkBtn-${topic.id}" ${!isActive ? 'disabled' : ''}>
                                ✅ Check Answers
                            </button>
                            <button class="btn btn-success" id="unlockBtn-${topic.id}" disabled>
                                🔓 Unlock Next Topic
                            </button>
                            <button class="btn btn-share" id="shareBtn-${topic.id}" ${!isCompleted ? 'disabled' : ''}>
                                📤 Share
                            </button>
                            <span class="score-display" id="scoreDisplay-${topic.id}">
                                Score: <strong>0</strong> / 20
                            </span>
                        </div>
                    `;

                container.appendChild(card);

                // --- render questions ---
                const qSection = card.querySelector(`#qSection-${topic.id}`);
                const saved = state.topicStatus[topic.id] || { answers: [], score: 0, checked: false };

                // Build questions if not built yet
                if (!topic.questions || topic.questions.length === 0) {
                    topic.questions = buildQuestionsForTopic(topic.id);
                }
                const qs = topic.questions;

                qs.forEach((q, qi) => {
                    let block = document.createElement('div');
                    block.className = 'q-block';
                    block.dataset.qidx = qi;
                    block.dataset.qType = q.type;

                    let qText = document.createElement('div');
                    qText.className = 'q-text';
                    qText.innerHTML = `
                            <span>Q${qi+1}.</span>
                            ${q.question}
                            <span class="q-type">${q.type.toUpperCase()}</span>
                        `;
                    block.appendChild(qText);

                    if (q.type === 'mcq') {
                        let optDiv = document.createElement('div');
                        optDiv.className = 'options';
                        q.options.forEach((opt, oi) => {
                            let label = document.createElement('label');
                            let radio = document.createElement('input');
                            radio.type = 'radio';
                            radio.name = `mcq_${topic.id}_${qi}`;
                            radio.value = oi;
                            if (saved.answers[qi] === oi) radio.checked = true;
                            label.appendChild(radio);
                            label.appendChild(document.createTextNode(opt));
                            optDiv.appendChild(label);
                        });
                        block.appendChild(optDiv);
                    } else if (q.type === 'tf') {
                        let optDiv = document.createElement('div');
                        optDiv.className = 'options';
                        ['True', 'False'].forEach((val, oi) => {
                            let label = document.createElement('label');
                            let radio = document.createElement('input');
                            radio.type = 'radio';
                            radio.name = `tf_${topic.id}_${qi}`;
                            radio.value = oi === 0 ? 'true' : 'false';
                            if (saved.answers[qi] === (oi === 0 ? true : false)) radio.checked = true;
                            label.appendChild(radio);
                            label.appendChild(document.createTextNode(val));
                            optDiv.appendChild(label);
                        });
                        block.appendChild(optDiv);
                    } else if (q.type === 'fill') {
                        let inp = document.createElement('input');
                        inp.type = 'text';
                        inp.className = 'fill-input';
                        inp.placeholder = 'Type your answer...';
                        if (saved.answers[qi] !== undefined && saved.answers[qi] !== null) {
                            inp.value = saved.answers[qi];
                        }
                        block.appendChild(inp);
                    }

                    // Feedback
                    let feedback = document.createElement('div');
                    feedback.className = 'feedback';
                    feedback.innerHTML = `
                            <span class="icon"></span>
                            <span class="msg"></span>
                        `;
                    block.appendChild(feedback);

                    // If already checked
                    if (saved.checked) {
                        const userAns = saved.answers[qi];
                        const isCorrect = (userAns !== undefined && userAns !== null && userAns === q.correct);
                        block.classList.add(isCorrect ? 'correct' : 'wrong');
                        feedback.classList.add('show');
                        feedback.querySelector('.icon').textContent = isCorrect ? '✅' : '❌';
                        let rightAns = q.correct;
                        if (q.type === 'tf') rightAns = q.correct ? 'True' : 'False';
                        else if (q.type === 'fill') rightAns = q.correct;
                        feedback.querySelector('.msg').innerHTML = isCorrect ?
                            `<strong>Correct!</strong> ✓` :
                            `<strong>Incorrect.</strong> Right answer: <strong>${rightAns}</strong>`;
                        // disable inputs
                        block.querySelectorAll('input').forEach(inp => inp.disabled = true);
                        if (block.querySelector('.fill-input')) {
                            const finp = block.querySelector('.fill-input');
                            finp.disabled = true;
                            finp.classList.add(isCorrect ? 'correct' : 'wrong');
                        }
                    }

                    qSection.appendChild(block);
                });

                // --- attach events ---
                const checkBtn = card.querySelector(`#checkBtn-${topic.id}`);
                const unlockBtn = card.querySelector(`#unlockBtn-${topic.id}`);
                const shareBtn = card.querySelector(`#shareBtn-${topic.id}`);
                const scoreSpan = card.querySelector(`#scoreDisplay-${topic.id}`);

                if (isActive) {
                    checkBtn.addEventListener('click', () => checkTopic(topic.id, card));
                }

                if (isCompleted) {
                    checkBtn.disabled = true;
                    unlockBtn.disabled = true;
                    const s = state.topicStatus[topic.id];
                    if (s) scoreSpan.innerHTML = `Score: <strong>${s.score}</strong> / 20`;
                    shareBtn.addEventListener('click', () => shareTopic(topic.id));
                }

                // if already checked but not completed
                if (saved.checked && !isCompleted && isActive) {
                    const s2 = state.topicStatus[topic.id];
                    if (s2) {
                        scoreSpan.innerHTML = `Score: <strong>${s2.score}</strong> / 20`;
                        if (s2.score === 20) {
                            unlockBtn.disabled = false;
                        }
                    }
                }

                // unlock button
                unlockBtn.addEventListener('click', () => {
                    if (state.completedTopics.includes(topic.id)) return;
                    const s = state.topicStatus[topic.id];
                    if (s && s.score === 20) {
                        state.completedTopics.push(topic.id);
                        let next = idx + 1;
                        while (next < TOPICS.length && state.completedTopics.includes(TOPICS[next].id)) next++;
                        if (next < TOPICS.length) {
                            state.currentTopic = next;
                        } else {
                            state.currentTopic = TOPICS.length;
                        }
                        saveState();
                        render();
                        updateProgress();
                        showToast(`🎉 Topic "${topic.name}" completed! Moving to next...`);
                    }
                });

                // Initialize score display
                if (!isCompleted && saved.score > 0) {
                    scoreSpan.innerHTML = `Score: <strong>${saved.score}</strong> / 20`;
                }

                if (saved.checked && saved.score === 20 && !isCompleted) {
                    unlockBtn.disabled = false;
                }

                if (!state.topicStatus[topic.id]) {
                    state.topicStatus[topic.id] = { answers: [], score: 0, checked: false };
                }
            });

            updateProgress();
            if (state.completedTopics.length === TOPICS.length) {
                document.querySelector('.main-header h1').innerHTML = '🏆 CSS Master! All 50 Topics Done! 🎉';
                showToast('🎉 Congratulations! You\'ve completed all 50 topics!');
            }
        }

        // ============================================================
        //  CHECK TOPIC
        // ============================================================

        function checkTopic(topicId, card) {
            const topic = TOPICS.find(t => t.id === topicId);
            if (!topic) return;
            const qs = topic.questions;
            const qBlocks = card.querySelectorAll('.q-block');
            let correctCount = 0;
            const answers = [];

            qBlocks.forEach((block, idx) => {
                const q = qs[idx];
                if (!q) return;
                let userAns = null;
                const feedback = block.querySelector('.feedback');
                const isFill = block.dataset.qType === 'fill';

                if (isFill) {
                    const inp = block.querySelector('.fill-input');
                    if (inp) {
                        userAns = inp.value.trim().toLowerCase();
                        inp.classList.remove('correct', 'wrong');
                    }
                } else {
                    const selected = block.querySelector('input:checked');
                    if (selected) {
                        if (q.type === 'mcq') userAns = parseInt(selected.value);
                        else if (q.type === 'tf') userAns = selected.value === 'true' ? true : false;
                    }
                }

                answers[idx] = userAns;

                const isCorrect = (userAns !== null && userAns !== undefined && userAns === q.correct);
                if (isCorrect) correctCount++;

                block.classList.remove('correct', 'wrong');
                block.classList.add(isCorrect ? 'correct' : 'wrong');

                feedback.classList.add('show');
                feedback.querySelector('.icon').textContent = isCorrect ? '✅' : '❌';
                let rightAns = q.correct;
                if (q.type === 'tf') rightAns = q.correct ? 'True' : 'False';
                else if (q.type === 'fill') rightAns = q.correct;
                feedback.querySelector('.msg').innerHTML = isCorrect ?
                    `<strong>Correct!</strong> ✓` :
                    `<strong>Incorrect.</strong> Right answer: <strong>${rightAns}</strong>`;

                block.querySelectorAll('input').forEach(inp => inp.disabled = true);
                if (isFill) {
                    const inp = block.querySelector('.fill-input');
                    if (inp) {
                        inp.disabled = true;
                        inp.classList.add(isCorrect ? 'correct' : 'wrong');
                    }
                }
            });

            state.topicStatus[topicId] = {
                answers: answers,
                score: correctCount,
                checked: true
            };

            const scoreSpan = card.querySelector(`#scoreDisplay-${topicId}`);
            if (scoreSpan) scoreSpan.innerHTML = `Score: <strong>${correctCount}</strong> / 20`;

            const unlockBtn = card.querySelector(`#unlockBtn-${topicId}`);
            if (unlockBtn && correctCount === 20) {
                unlockBtn.disabled = false;
                unlockBtn.textContent = '🔓 Unlock Next Topic';
                showToast(`🎉 Perfect score! You can unlock the next topic.`);
            } else if (unlockBtn) {
                unlockBtn.disabled = true;
                showToast(`❌ You got ${correctCount}/20. Need 20/20 to unlock. Try again!`);
                const checkBtn = card.querySelector(`#checkBtn-${topicId}`);
                if (checkBtn) {
                    checkBtn.disabled = false;
                    checkBtn.textContent = '🔄 Retry';
                }
                qBlocks.forEach((block) => {
                    block.querySelectorAll('input').forEach(inp => inp.disabled = false);
                    const feedback = block.querySelector('.feedback');
                    feedback.classList.remove('show');
                    block.classList.remove('correct', 'wrong');
                    if (block.querySelector('.fill-input')) {
                        const finp = block.querySelector('.fill-input');
                        finp.disabled = false;
                        finp.classList.remove('correct', 'wrong');
                    }
                });
                state.topicStatus[topicId].checked = false;
                state.topicStatus[topicId].answers = [];
                state.topicStatus[topicId].score = 0;
                saveState();
                return;
            }

            const checkBtn = card.querySelector(`#checkBtn-${topicId}`);
            if (checkBtn && correctCount === 20) {
                checkBtn.disabled = true;
            }

            saveState();
            updateProgress();
        }

        // ============================================================
        //  SHARE
        // ============================================================

        function shareTopic(topicId) {
            const topic = TOPICS.find(t => t.id === topicId);
            if (!topic) return;
            const s = state.topicStatus[topicId];
            const text =
                `🎨 I completed "${topic.name}" in CSS Tutorial!\n📊 Score: ${s.score}/20\n📚 Progress: ${state.completedTopics.length}/${TOPICS.length} topics done!\n\nLearn CSS with me! 🚀`;
            if (navigator.share) {
                navigator.share({
                    title: 'CSS Tutorial Progress',
                    text: text,
                    url: window.location.href
                }).catch(() => {});
            } else {
                navigator.clipboard.writeText(text).then(() => {
                    showToast('📤 Progress copied to clipboard! Share it!');
                }).catch(() => {
                    showToast('📤 Share: ' + text);
                });
            }
        }

        function shareProgress() {
            const text =
                `🎨 My CSS Tutorial Progress:\n📚 ${state.completedTopics.length}/${TOPICS.length} topics completed!\n💪 Learning CSS one topic at a time!\n\nStart learning today! 🚀`;
            if (navigator.share) {
                navigator.share({
                    title: 'CSS Tutorial Progress',
                    text: text,
                    url: window.location.href
                }).catch(() => {});
            } else {
                navigator.clipboard.writeText(text).then(() => {
                    showToast('📤 Progress copied to clipboard!');
                }).catch(() => {
                    showToast('📤 ' + text);
                });
            }
        }

        // ============================================================
        //  PROGRESS
        // ============================================================

        function updateProgress() {
            const total = TOPICS.length;
            const done = state.completedTopics.length;
            const pct = Math.round((done / total) * 100);
            progressBar.style.width = pct + '%';
            completedSpan.textContent = done;
            document.getElementById('totalTopics').textContent = total;
            document.getElementById('totalQuestions').textContent = total * 20;
        }

        // ============================================================
        //  TOAST
        // ============================================================

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toast._timer);
            toast._timer = setTimeout(() => {
                toast.classList.remove('show');
            }, 4000);
        }

        // ============================================================
        //  INIT
        // ============================================================

        loadState();

        TOPICS.forEach(topic => {
            if (!topic.questions || topic.questions.length === 0) {
                topic.questions = buildQuestionsForTopic(topic.id);
            }
        });

        render();

        console.log('🔥 CSSX.html loaded — 50 topics with deep explanations, 20 questions each!');
        console.log('💾 Data saved in localStorage automatically!');
    </script>
</body>
</html>
