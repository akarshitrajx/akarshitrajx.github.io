<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coding News - Coding Master</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }

        /* Navigation */
        nav {
            background: #1e293b;
            border-bottom: 1px solid #334155;
            padding: 16px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            color: #fbbf24;
            font-size: 24px;
            font-weight: 700;
            text-decoration: none;
        }
        .nav-links {
            display: flex;
            gap: 24px;
            align-items: center;
        }
        .nav-links a {
            color: #94a3b8;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
            font-size: 15px;
        }
        .nav-links a:hover { color: #fbbf24; }
        .nav-links a.active { color: #fbbf24; }
        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            color: #fbbf24;
            font-size: 24px;
            cursor: pointer;
        }

        /* Hero */
        .hero {
            text-align: center;
            padding: 60px 20px 40px;
            background: #1e293b;
            border-bottom: 1px solid #334155;
        }
        .hero-badge {
            display: inline-block;
            background: #fbbf24;
            color: #0f172a;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 16px;
        }
        .hero h1 {
            font-size: 42px;
            color: #f8fafc;
            margin-bottom: 12px;
            font-weight: 800;
        }
        .hero p {
            color: #94a3b8;
            font-size: 18px;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Filter */
        .filter-bar {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        .filter-btn {
            padding: 8px 18px;
            border: 1px solid #334155;
            background: #1e293b;
            color: #94a3b8;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
        }
        .filter-btn:hover, .filter-btn.active {
            background: #fbbf24;
            color: #0f172a;
            border-color: #fbbf24;
        }

        /* News Grid */
        .news-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px 60px;
        }
        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 24px;
        }

        .news-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }
        .news-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        .news-card-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #334155;
            display: block;
        }
        .news-card-body {
            padding: 20px;
        }
        .news-card-category {
            display: inline-block;
            background: #fbbf24;
            color: #0f172a;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        .news-card h3 {
            color: #f8fafc;
            font-size: 18px;
            margin-bottom: 10px;
            line-height: 1.4;
            font-weight: 600;
        }
        .news-card p {
            color: #94a3b8;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 16px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .news-card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #64748b;
            font-size: 13px;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 20px;
            max-width: 800px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-header {
            position: relative;
        }
        .modal-header img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-radius: 20px 20px 0 0;
            display: block;
        }
        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            background: rgba(0,0,0,0.6);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-body {
            padding: 28px;
        }
        .modal-body .category {
            display: inline-block;
            background: #fbbf24;
            color: #0f172a;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        .modal-body h2 {
            color: #f8fafc;
            font-size: 28px;
            margin-bottom: 8px;
            font-weight: 700;
        }
        .modal-body .date {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .modal-body .content {
            color: #cbd5e1;
            line-height: 1.8;
            font-size: 16px;
            white-space: pre-wrap;
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: #64748b;
        }
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #334155;
            border-top-color: #fbbf24;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #64748b;
            grid-column: 1 / -1;
        }
        .empty-state h3 {
            color: #94a3b8;
            margin-bottom: 8px;
            font-size: 20px;
        }
        .empty-state p {
            font-size: 16px;
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 16px 24px;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            transform: translateX(400px);
            transition: transform 0.3s;
            z-index: 1000;
        }
        .toast.show { transform: translateX(0); }
        .toast.success { background: #22c55e; }
        .toast.error { background: #ef4444; }

        /* Mobile */
        @media (max-width: 768px) {
            .hero h1 { font-size: 28px; }
            .news-grid { grid-template-columns: 1fr; }
            .nav-links { display: none; }
            .mobile-menu-btn { display: block; }
            .filter-bar { justify-content: center; }
        }

        .mobile-nav {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #0f172a;
            z-index: 200;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
        }
        .mobile-nav.active { display: flex; }
        .mobile-nav a {
            color: #e2e8f0;
            text-decoration: none;
            font-size: 24px;
            font-weight: 600;
        }
        .mobile-nav .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: #fbbf24;
            font-size: 30px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav>
        <div class="nav-container">
            <a href="index.html" class="logo">⚡ CodingMaster</a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="tutorials.html">Tutorials</a>
                <a href="news.html" class="active">News</a>
                <a href="daily-quiz.html">Quiz</a>
                <a href="practice-daily.html">Practice</a>
                <a href="contact.html">Contact</a>
            </div>
            <button class="mobile-menu-btn" onclick="toggleMobileNav()">☰</button>
        </div>
    </nav>

    <!-- Mobile Nav -->
    <div class="mobile-nav" id="mobileNav">
        <button class="close-btn" onclick="toggleMobileNav()">✕</button>
        <a href="index.html">Home</a>
        <a href="tutorials.html">Tutorials</a>
        <a href="news.html">News</a>
        <a href="daily-quiz.html">Quiz</a>
        <a href="practice-daily.html">Practice</a>
        <a href="contact.html">Contact</a>
    </div>

    <!-- Hero -->
    <section class="hero">
        <div class="hero-badge">📰 Latest Updates</div>
        <h1>Coding News</h1>
        <p>Stay updated with the latest trends, tools, and technologies in the coding world</p>
    </section>

    <!-- Filter -->
    <div class="filter-bar">
        <button class="filter-btn active" onclick="filterNews('all')">All</button>
        <button class="filter-btn" onclick="filterNews('JavaScript')">JavaScript</button>
        <button class="filter-btn" onclick="filterNews('Python')">Python</button>
        <button class="filter-btn" onclick="filterNews('Web Development')">Web Dev</button>
        <button class="filter-btn" onclick="filterNews('AI/ML')">AI/ML</button>
        <button class="filter-btn" onclick="filterNews('Career')">Career</button>
        <button class="filter-btn" onclick="filterNews('Tools')">Tools</button>
    </div>

    <!-- News Grid -->
    <div class="news-container">
        <div id="newsGrid" class="news-grid">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>Loading news...</p>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div id="newsModal" class="modal-overlay" onclick="closeModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <img id="modalImage" src="" alt="">
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <div class="modal-body">
                <span class="category" id="modalCategory">General</span>
                <h2 id="modalTitle">Title</h2>
                <div class="date" id="modalDate">Date</div>
                <div class="content" id="modalContent">Content</div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        // ========== SUPABASE CONFIG ==========
        const SUPABASE_URL = 'https://azodsizcpawgwhowqdir.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF6b2RzaXpjcGF3Z3dob3dxZGlyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MjA5NDUsImV4cCI6MjA5NzA5Njk0NX0.i77gxmMddm-dr4tQCfSGBnQkCPE1sx3muDdKeYqmWVQ';

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let allNews = [];

        // ========== LOAD NEWS ==========
        async function loadNews() {
            try {
                const { data: news, error } = await supabase
                    .from('news')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                allNews = news || [];
                renderNews(allNews);
            } catch (err) {
                console.error('Error loading news:', err);
                document.getElementById('newsGrid').innerHTML = `
                    <div class="empty-state">
                        <h3>Unable to load news</h3>
                        <p>Please check your connection and try again.</p>
                    </div>
                `;
                showToast('Error loading news: ' + err.message, 'error');
            }
        }

        function renderNews(news) {
            const container = document.getElementById('newsGrid');

            if (!news || news.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>No news articles yet</h3>
                        <p>Check back later for updates!</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = news.map(item => `
                <div class="news-card" onclick="openModal(${item.id})">
                    <img class="news-card-image" 
                         src="${item.image_url || 'https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=600'}" 
                         alt="${escapeHtml(item.title)}"
                         onerror="this.src='https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=600'">
                    <div class="news-card-body">
                        <span class="news-card-category">${item.category || 'General'}</span>
                        <h3>${escapeHtml(item.title)}</h3>
                        <p>${escapeHtml(item.content)}</p>
                        <div class="news-card-footer">
                            <span>📅 ${formatDate(item.created_at)}</span>
                            <span>Read More →</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // ========== FILTER ==========
        function filterNews(category) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            if (category === 'all') {
                renderNews(allNews);
            } else {
                const filtered = allNews.filter(item => item.category === category);
                renderNews(filtered);
            }
        }

        // ========== MODAL ==========
        function openModal(id) {
            const item = allNews.find(n => n.id === id);
            if (!item) return;

            document.getElementById('modalImage').src = item.image_url || 'https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=800';
            document.getElementById('modalImage').onerror = function() {
                this.src = 'https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=800';
            };
            document.getElementById('modalCategory').textContent = item.category || 'General';
            document.getElementById('modalTitle').textContent = item.title;
            document.getElementById('modalDate').textContent = formatDate(item.created_at);
            document.getElementById('modalContent').textContent = item.content;
            document.getElementById('newsModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal(e) {
            if (!e || e.target === document.getElementById('newsModal')) {
                document.getElementById('newsModal').classList.remove('active');
                document.body.style.overflow = '';
            }
        }

        // ========== MOBILE NAV ==========
        function toggleMobileNav() {
            document.getElementById('mobileNav').classList.toggle('active');
        }

        // ========== UTILS ==========
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDate(dateString) {
            if (!dateString) return 'Unknown date';
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', { 
                year: 'numeric', month: 'long', day: 'numeric'
            });
        }

        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // ========== INIT ==========
        loadNews();
    </script>
</body>
</html>
